name: "Test"
on:
  pull_request:
  push:
    branches-ignore:
      # Don't run twice on automation updates, rely on pull_request hook
      - 'automation/**'
      - 'dependabot/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests-pass:
    name: all systems go
    runs-on: ubuntu-latest
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      - run: exit 1
    needs:
      - tests
      - zizmor

  tests:
    name: run tests
    strategy:
      # Allow other jobs to finish building and cache properly before bailing
      fail-fast: false
      matrix:
        include:
          #- os: macos-12
          - os: ubuntu-latest
            system: "x86_64-linux"
          - os: ubuntu-latest
            qemuPlatforms: "arm64"
            system: "aarch64-linux"
            extraPlatforms: "aarch64-linux"
    runs-on: ${{ matrix.os }}
    environment: flake-update
    env:
      SYSTEMS: ${{ matrix.system }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      with:
        extra_nix_config: |
          extra-platforms = ${{ matrix.extraPlatforms }}

    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: ipetkov
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'

    - name: install QEMU/binfmt
      if: ${{ matrix.qemuPlatforms != '' }}
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      with:
        image: tonistiigi/binfmt:latest
        platforms: ${{ matrix.qemuPlatforms }}

    - name: build all definitions
      run: nix develop .#ci --command nix-fast-build --skip-cached --no-nom --eval-workers 1 --systems "${SYSTEMS}"

  zizmor:
    name: run zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
    - name: Run zizmor 🌈
      run: nix develop .#zizmor --command zizmor --persona=auditor --format=sarif . >results.sarif 
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        sarif_file: results.sarif
        category: zizmor
